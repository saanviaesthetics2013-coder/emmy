<!DOCTYPE html>
<html>
<head>
  <title>Neura Library</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hud">
    <div>NEURA LIBRARY</div>
    <div id="stats">XP 0 | LVL 1 | STREAK 0 🔥</div>
  </div>

  <div class="layout">

    <!-- LEFT: BOOKS -->
    <div id="library" class="panel"></div>

    <!-- CENTER: GAME SCREEN -->
    <div id="screen" class="panel screen">
      <div class="hint">Select a book to start your mission</div>
    </div>

    <!-- RIGHT: AI COMPANION -->
    <div class="panel ai">
      <div class="orb"></div>
      <div id="aiText">System online.</div>
    </div>

  </div>

  <script src="books.js"></script>
  <script src="app.js"></script>

</body>
</html>
